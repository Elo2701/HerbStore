<style>
body,h1,h2,h3,h4,h5,h6 {font-family: "Karma", sans-serif}

#wrapper {
  max-width: 1100px;
  margin: auto;
}

.header {
  position: sticky;
  top: 0;
  background: white;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.header img { height: 120px; }

.herb-card { margin-bottom: 15px; padding: 10px; }

.product-img {
  width: 100%;
  max-height: 220px;
  object-fit: contain;
  background: #f5f5f5;
  border-radius: 6px;
  padding: 5px;
}

.price {
  font-size: 14px;
  font-weight: bold;
  color: #2e7d32;
}

.cart-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:6px 0;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <img src="./static/logo.png">
  <div>
    <div><b>Grow Roots</b></div>
    <div style="font-size:16px;">Natural Ingredients. Real Results.</div>
  </div>
</div>

<div id="wrapper">
  <div class="w3-main w3-content w3-padding">

    <div class="w3-row-padding w3-padding-16 w3-center" id="herbs"></div>

    <hr>

      <h2>Your Cart</h2>

      <div id="cart">Your cart is empty</div>
      <h3 id="total"></h3>

      <hr>

      <input id="customerName" class="w3-input w3-border" placeholder="Full Name">
      <input id="customerPhone" class="w3-input w3-border" placeholder="Phone Number" style="margin-top:5px;">

      <select id="deliveryOption" class="w3-select w3-border" style="margin-top:5px;" onchange="toggleAddress()">
        <option value="pickup">Pickup</option>
        <option value="delivery">Delivery</option>
      </select>

      <textarea id="customerAddress" class="w3-input w3-border"
        placeholder="Delivery Address"
        style="margin-top:5px; display:none;"></textarea>

      <br>

      <button onclick="payNow()" class="w3-button w3-green w3-round">
        Pay Now
      </button>

    </div>
  </div>
</div>

<!-- PAYFAST -->
<form id="payfastForm" method="post" action="https://www.payfast.co.za/eng/process">

  <input type="hidden" name="merchant_id" value="YOUR_MERCHANT_ID">
  <input type="hidden" name="merchant_key" value="YOUR_MERCHANT_KEY">

  <input type="hidden" name="amount" id="pf_amount">
  <input type="hidden" name="item_name" value="Grow Roots Order">
  <input type="hidden" name="m_payment_id" id="pf_order_id">

  <input type="hidden" name="return_url" value="success.html">
  <input type="hidden" name="cancel_url" value="cancel.html">

</form>

<script>

function generateOrderNumber() {
  return "ORD-" + Math.floor(100000 + Math.random() * 900000);
}

let selectedOptions = {};
let cart = {};

const products = [
  { id: 1, name: "SlimAura Capsules", price: 100, bulkPrice: 80, bulkThreshold: 3,
    description: "Appetite control\nBoost metabolism\nWeight management",
    image: "./static/one.png"
  },
  { id: 2, name: "SlimAura Combo", price: 250,
    description: "Weight management\nReduce bloating\nNatural support",
    image: "./static/two.png"
  },
  { id: 3, name: "Flat Tummy Capsules", price: 100, bulkPrice: 80, bulkThreshold: 3,
    description: "Fat reduction\nMen & women\nDaily use",
    image: "./static/three.png"
  },

  {  
  id: 4, 
  name: "Dr Jemaier Super-Whitening AHA Ginseng Serum + Lansyade AHA Lotion Combo", 
  price: 250, 
  description: "• Intensely Whitens in 3 Days\n• Clears Dark Spots & Blemishes\n• Fast Skin Whitening & Even Tone", 
  image: "./static/four.png" 
},
{
id: 5, 
name: "Shenic Perfect Legs Serum",     
price: 200,
description: "• Firms & Smoothes Skin\n• Reduces Stretch Marks & Fades Dark Spots",
image: "./static/five.png"   
},
{
  id: 6, 
  name: "DR-Rashel Black Soap",                          
  price: 70,
  description: "• Clears Pimples & Acne \n• Detoxifies & Cleanses Skin\n• Reduces Excess Oil\n• Anti-Bacterial Effect",
  image: "./static/six.png"
},
{
  id: 7, 
  name: "Kojic White Face Cream",                          
  price: 150,
  description: "• Brightens  Skin\n• Fades Dark Spots\n• Even Skin Tone",
  image: "./static/seven.png"
},
{
  id: 8, 
  name: "Lansyade Natural Skincare AHA White Body Serum",                          
  price: 120,
  description: "• Achieve Full Body Whitening\n• Clears Stubborn Dark Spots\n• Brightens and Evens Skin Tone",
  image: "./static/eight.png"
},
{
  id: 9, 
  name: "Iyamo Essence",                          
  price: 100,
  description: "•  Say goodbye to piles \n• No more itching & discomfort \n•  Stay fresh & clean all day \n•  Intimate care on another level ",
  image: "./static/nine.png"
},
{
  id: 10, 
  name: "Yoni Detox Pearls",                          
  price: 40, bulkPrice: 30, bulkThreshold: 3,
  description: "• 1 Pck(3 Pearls)\n• Reduces Stretch Marks\n• Fades Dark Spots",
  image: "./static/ten.png"
},

  { 
    id: 11, 
    name: "Premium MORINGA Powder & MORINGA Capsules", 
    options: [
      { size: "100g", price: 50 },
      { size: "1L", price: 120 },
      { size: "2L", price: 200 },
      { size: "1KG", price: 150 }
    ],
    description: "• Boosts Energy Naturally\n• Supports Immune System\n• Rich in Vitamins & Nutrients\n• Supports Overall Wellness", 
    image: "./static/eleven.png" 
  },

  {
    id: 12, 
    name: "Patience's Beauty Premium Guava Powder", 
    description: "• High Vitamin C\n• Digestive Health\n• Antioxidant Rich\n• Weight Management", 
    image: "./static/twelve.png",
    variations: [
      { size: "100g", price: 50, bulkPrice: 30, bulkThreshold: 10 },
      { size: "1Lt", price: 100, bulkPrice: 100, bulkThreshold: 1 },
      { size: "2Lt", price: 120, bulkPrice: 120, bulkThreshold: 1 },
      { size: "5Lt", price: 500, bulkPrice: 500, bulkThreshold: 1 }
    ]
  },

  { 
    id: 13, 
    name: "Patience's Beauty Premium Cinnamon Sticks", 
    description: "• Anti-Inflammatory\n• Metabolism Boost\n• Blood Sugar Support\n• Antioxidants", 
    image: "./static/thirteen.png",
    variations: [
      { size: "100g (Split)", price: 50, bulkPrice: 30, bulkThreshold: 10 },
      { size: "500g (Split)", price: 50, bulkPrice: 30, bulkThreshold: 5 },
      { size: "500g (Premium)", price: 200, bulkPrice: 200, bulkThreshold: 1 },
      { size: "1kg", price: 350, bulkPrice: 350, bulkThreshold: 1 }
    ]
  }
];

// ---------------- CART LOGIC ----------------

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCart();
}

function decreaseQty(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  updateCart();
}

function removeItem(id) {
  delete cart[id];
  updateCart();
}

function toggleAddress() {
  document.getElementById("customerAddress").style.display =
    document.getElementById("deliveryOption").value === "delivery"
    ? "block" : "none";
}

// ---------------- PRICE HANDLER ----------------

function getPrice(p, qty, optIndex = 0) {
  if (p.options) return p.options[optIndex]?.price ?? 0;

  if (p.variations) {
    let v = p.variations[optIndex];
    if (!v) return 0;

    if (qty >= v.bulkThreshold) return v.bulkPrice;
    return v.price;
  }

  return p.price ?? 0;
}

// ---------------- PRODUCTS ----------------

function loadProducts() {
  let html = "";

  products.forEach(p => {

    let dropdown = "";

    if (p.options) {
      dropdown = `<select onchange="selectedOptions[${p.id}] = this.value">
        ${p.options.map((o,i)=>`
          <option value="${i}">${o.size} - R${o.price}</option>
        `).join("")}
      </select>`;
    }

    if (p.variations) {
      dropdown = `<select onchange="selectedOptions[${p.id}] = this.value">
        ${p.variations.map((o,i)=>`
          <option value="${i}">${o.size} - R${o.price}</option>
        `).join("")}
      </select>`;
    }

    html += `
      <div class="w3-col l3 m6 s6">
        <div class="herb-card w3-card">

          <img src="${p.image}" class="product-img">

          <b>${p.name}</b>

          <div style="font-size:12px; white-space:pre-line;">
            ${p.description}
          </div>

          <div class="price">R${p.price ?? (p.options ? p.options[0].price : p.variations ? p.variations[0].price : 0)}</div>

          ${dropdown}

          <button onclick="addToCart(${p.id})"
            class="w3-button w3-green w3-small w3-round"
            style="width:100%; margin-top:6px;">
            Add
          </button>

        </div>
      </div>
    `;
  });

  document.getElementById("herbs").innerHTML = html;
}

// ---------------- CART ----------------

function updateCart() {
  let html = "";
  let total = 0;

  if (Object.keys(cart).length === 0) {
    document.getElementById("cart").innerHTML = "Your cart is empty";
    document.getElementById("total").innerText = "";
    return;
  }

  for (let id in cart) {
    let p = products.find(x => x.id == id);
    let qty = cart[id];

    let optIndex = selectedOptions[id] || 0;
    let price = getPrice(p, qty, optIndex);

    total += price * qty;

    html += `
      <div class="cart-item">
        <div>${p.name}<br>R${price} x ${qty}</div>

        <div>
          <button onclick="decreaseQty(${id})">-</button>
          <button onclick="addToCart(${id})">+</button>
          <button onclick="removeItem(${id})">x</button>
        </div>
      </div>
    `;
  }

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: R" + total;
}

// ---------------- PAY ----------------

function payNow() {
  let orderId = generateOrderNumber();
  let total = 0;

  for (let id in cart) {
    let p = products.find(x => x.id == id);
    let qty = cart[id];

    let optIndex = selectedOptions[id] || 0;
    total += getPrice(p, qty, optIndex) * qty;
  }

  document.getElementById("pf_amount").value = total.toFixed(2);
  document.getElementById("pf_order_id").value = orderId;

  document.getElementById("payfastForm").submit();
}

loadProducts();

</script>

</body>
</html>
