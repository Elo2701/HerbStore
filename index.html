<!DOCTYPE html>
<html>
<head>
<title>Grow Roots</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Karma">

<style>
body,h1,h2,h3,h4,h5,h6 {font-family: "Karma", sans-serif}

#wrapper {
  max-width: 1100px;
  margin: auto;
}

.header {
  position: sticky;
  top: 0;
  background: white;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.header img {
  height: 120px;
}

.herb-card {
  margin-bottom: 15px;
  padding: 10px;
}

.product-img {
  width: 100%;
  height: auto;
  max-height: 220px;
  object-fit: contain;
  background: #f5f5f5;
  border-radius: 6px;
  padding: 5px;
}

.price {
  font-size: 14px;
  font-weight: bold;
  color: #2e7d32;
}

.cart-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:6px 0;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="./static/logo.png">
  <div>
    <div><b>Grow Roots</b></div>
    <div style="font-size:16px;">Natural Ingredients. Real Results.</div>
  </div>
</div>

<div id="wrapper">

  <div class="w3-main w3-content w3-padding">

    <!-- PRODUCTS -->
    <div class="w3-row-padding w3-padding-16 w3-center" id="herbs"></div>

    <hr>

    <!-- CART -->
    <div class="w3-container w3-card w3-padding">

      <h2>Your Cart</h2>

      <div id="cart">Your cart is empty</div>
      <h3 id="total"></h3>

      <hr>

      <input id="customerName" class="w3-input w3-border" placeholder="Full Name">
      <input id="customerPhone" class="w3-input w3-border" placeholder="Phone Number" style="margin-top:5px;">

      <select id="deliveryOption" class="w3-select w3-border" style="margin-top:5px;" onchange="toggleAddress()">
        <option value="pickup">Pickup</option>
        <option value="delivery">Delivery</option>
      </select>

      <textarea id="customerAddress" class="w3-input w3-border"
        placeholder="Delivery Address"
        style="margin-top:5px; display:none;"></textarea>

      <br>

      <button onclick="payNow()" class="w3-button w3-green w3-round">
        Pay Now
      </button>

    </div>

  </div>
</div>

<!-- PAYFAST FORM -->
<form id="payfastForm" method="post" action="https://www.payfast.co.za/eng/process">

  <input type="hidden" name="merchant_id" value="YOUR_MERCHANT_ID">
  <input type="hidden" name="merchant_key" value="YOUR_MERCHANT_KEY">

  <input type="hidden" name="amount" id="pf_amount">
  <input type="hidden" name="item_name" value="Grow Roots Order">
  <input type="hidden" name="m_payment_id" id="pf_order_id">

  <input type="hidden" name="return_url" value="success.html">
  <input type="hidden" name="cancel_url" value="cancel.html">

</form>

<script>

function generateOrderNumber() {
  return "ORD-" + Math.floor(100000 + Math.random() * 900000);
}

const products = [
  { id: 1, name: "SlimAura Capsules", price: 100, bulkPrice: 80, bulkThreshold: 3,
    description: "Appetite control\nBoost metabolism\nWeight management",
    image: "./static/one.png"
  },
  { id: 2, name: "SlimAura Combo", price: 250,
    description: "Weight management\nReduce bloating\nNatural support",
    image: "./static/two.png"
  },
  { id: 3, name: "Flat Tummy Capsules", price: 100, bulkPrice: 80, bulkThreshold: 3,
    description: "Fat reduction\nMen & women\nDaily use",
    image: "./static/three.png"
  }
];

let cart = {};

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCart();
}

function decreaseQty(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  updateCart();
}

function removeItem(id) {
  delete cart[id];
  updateCart();
}

function toggleAddress() {
  document.getElementById("customerAddress").style.display =
    document.getElementById("deliveryOption").value === "delivery"
    ? "block" : "none";
}

function loadProducts() {
  let html = "";

  products.forEach(p => {
    html += `
      <div class="w3-col l3 m6 s6">
        <div class="herb-card w3-card">

          <img src="${p.image}" class="product-img">

          <div>
            <b>${p.name}</b>

            <div style="font-size:12px; white-space:pre-line;">
              ${p.description}
            </div>

            <div class="price">R${p.price}</div>

            <button onclick="addToCart(${p.id})"
              class="w3-button w3-green w3-small w3-round"
              style="width:100%; margin-top:6px;">
              Add
            </button>
          </div>

        </div>
      </div>
    `;
  });

  document.getElementById("herbs").innerHTML = html;
}

function updateCart() {
  let html = "";
  let total = 0;

  if (Object.keys(cart).length === 0) {
    document.getElementById("cart").innerHTML = "Your cart is empty";
    document.getElementById("total").innerText = "";
    return;
  }

  for (let id in cart) {
    let p = products.find(x => x.id == id);
    let qty = cart[id];

    let price = p.price;
    if (p.bulkPrice && qty >= p.bulkThreshold) {
      price = p.bulkPrice;
    }

    total += price * qty;

    html += `
      <div class="cart-item">
        <div>${p.name}<br>R${price} x ${qty}</div>

        <div>
          <button onclick="decreaseQty(${id})">-</button>
          <button onclick="addToCart(${id})">+</button>
          <button onclick="removeItem(${id})">x</button>
        </div>
      </div>
    `;
  }

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: R" + total;
}

function payNow() {

  if (Object.keys(cart).length === 0) {
    alert("Cart empty");
    return;
  }

  let name = document.getElementById("customerName").value;
  let phone = document.getElementById("customerPhone").value;
  let method = document.getElementById("deliveryOption").value;
  let address = document.getElementById("customerAddress").value;

  if (!name || !phone) {
    alert("Fill name and phone");
    return;
  }

  if (method === "delivery" && !address) {
    alert("Enter address");
    return;
  }

  let orderId = generateOrderNumber();
  let total = 0;

  for (let id in cart) {
    let p = products.find(x => x.id == id);
    let qty = cart[id];

    let price = p.price;
    if (p.bulkPrice && qty >= p.bulkThreshold) {
      price = p.bulkPrice;
    }

    total += price * qty;
  }

  document.getElementById("pf_amount").value = total.toFixed(2);
  document.getElementById("pf_order_id").value = orderId;

  localStorage.setItem("order", JSON.stringify({
    orderId,
    name,
    phone,
    method,
    address,
    cart,
    total
  }));

  document.getElementById("payfastForm").submit();
}

loadProducts();

</script>

</body>
</html>
